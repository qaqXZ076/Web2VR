# ============================================================================
# Web2VR — Build & Release
#
# Triggers:
#   1. Push to main → create/update prerelease tagged v{version}
#   2. Push v* tag  → create official release
#
# Flow:
#   package (matrix, parallel)  →  release
#     linux-x64  ─┐
#     win-x64   ──┤─→  collect archives + checksums → GitHub Release
#     darwin-arm64─┤
#     darwin-x64 ─┘
# ============================================================================

name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write


jobs:
  # ---------------------------------------------------------------------------
  # Package: build & archive for each platform in parallel
  # ---------------------------------------------------------------------------
  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux-x64
          - win-x64
          - darwin-arm64
          - darwin-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Package for ${{ matrix.platform }}
        run: node scripts/package.js --platform ${{ matrix.platform }}

      - name: Upload archive
        uses: actions/upload-artifact@v5
        with:
          name: archive-${{ matrix.platform }}
          # Only upload the final archives, not staging dirs or cache
          path: |
            dist/Web2VR-*.tar.gz
            dist/Web2VR-*.zip
          if-no-files-found: warn
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Release: collect all archives, generate checksums, publish to GitHub
  # ---------------------------------------------------------------------------
  release:
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📌 Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: archive-*
          merge-multiple: true

      - name: Prepare release assets
        id: prepare
        run: |
          mkdir -p release-assets

          # Flatten: find all archives from any subdirectory structure
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) \
            ! -name "node-*" \
            -exec cp {} release-assets/ \;

          # List what we got
          echo "📦 Release assets:"
          ls -lh release-assets/

          # Generate SHA256 checksums
          cd release-assets
          if ls *.tar.gz *.zip 1>/dev/null 2>&1; then
            sha256sum *.tar.gz *.zip > checksums-sha256.txt
            echo ""
            echo "🔑 SHA256 Checksums:"
            cat checksums-sha256.txt
          fi

          # Count assets for the summary
          ASSET_COUNT=$(find . -type f ! -name checksums-sha256.txt | wc -l)
          echo "asset_count=$ASSET_COUNT" >> "$GITHUB_OUTPUT"

      - name: Determine release type
        id: release_type
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "🏷️ Official release (tag trigger)"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "🔧 Pre-release (main branch trigger)"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Web2VR v${{ steps.version.outputs.version }}
          body: |
            ## Web2VR v${{ steps.version.outputs.version }}

            ### 📦 Downloads

            | Platform | File | Format |
            |----------|------|--------|
            | Linux x86_64 | `Web2VR-linux-x64-v*.tar.gz` | tar.gz |
            | Windows x86_64 | `Web2VR-win-x64-v*.zip` | zip |
            | macOS ARM64 | `Web2VR-darwin-arm64-v*.tar.gz` | tar.gz |
            | macOS x86_64 | `Web2VR-darwin-x64-v*.tar.gz` | tar.gz |

            ### 🚀 Quick Start

            **Windows**
            1. Extract the ZIP file
            2. Double-click `start.bat` (or run `start.ps1` in PowerShell)
            3. Open http://localhost:3000 in Chrome/Edge

            **Linux / macOS**
            1. Extract the archive: `tar xzf Web2VR-*.tar.gz`
            2. Run: `cd Web2VR && ./start.sh`
            3. Open http://localhost:3000 in Chrome/Edge

            ### 📋 Requirements

            - **VR Mode**: Chrome/Edge with WebXR support + VR headset + SteamVR
            - **Screen Capture**: Chrome/Edge browser (no server-side setup needed)

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
